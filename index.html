    // canvasを90度回転した新しいcanvasを返す（direction: 1=時計回り, -1=反時計回り）
    function rotateCanvas90(srcCanvas, direction) {
      const rotated = document.createElement('canvas');
      rotated.width = srcCanvas.height;
      rotated.height = srcCanvas.width;
      const ctx = rotated.getContext('2d');
      if (direction === 1) {
        ctx.translate(rotated.width, 0);
        ctx.rotate(Math.PI / 2);
      } else {
        ctx.translate(0, rotated.height);
        ctx.rotate(-Math.PI / 2);
      }
      ctx.drawImage(srcCanvas, 0, 0);
      return rotated;
    }

    // カード検出＋傾き補正を1パターン試す。成功すれば補正後canvasを、失敗すればnullを返す。
    function tryDetectAndWarpForManual(srcCanvas) {
      const mats = [];
      const track = (m) => { mats.push(m); return m; };
      try {
        const src = track(cv.imread(srcCanvas));
        const blurred = track(new cv.Mat());
        cv.GaussianBlur(src, blurred, new cv.Size(5, 5), 0);
        const gray = track(new cv.Mat());
        cv.cvtColor(blurred, gray, cv.COLOR_RGBA2GRAY);
        const binary = track(new cv.Mat());
        cv.threshold(gray, binary, 0, 255, cv.THRESH_BINARY + cv.THRESH_OTSU);
        const edges = track(new cv.Mat());
        cv.Canny(gray, edges, 50, 150);
        const lines = track(new cv.Mat());
        const minLineLen = Math.min(src.cols, src.rows) * 0.25;
        cv.HoughLinesP(edges, lines, 1, Math.PI / 180, 60, minLineLen, 20);

        const segments = [];
        for (let i = 0; i < lines.rows; i++) {
          segments.push({
            x1: lines.data32S[i * 4], y1: lines.data32S[i * 4 + 1],
            x2: lines.data32S[i * 4 + 2], y2: lines.data32S[i * 4 + 3],
          });
        }

        const detection = detectCardCorners(src, gray, binary, segments);
        if (!detection || !isPlausibleCardAspect(detection.corners)) return null;

        const warped = track(warpCard(src, detection.corners, 0.15));
        const outCanvas = document.createElement('canvas');
        cv.imshow(outCanvas, warped);
        return { outCanvas, corners: detection.corners, srcCanvas };
      } catch (e) {
        console.error('manual auto-correct candidate failed', e);
        return null;
      } finally {
        cleanup(mats);
      }
    }

    // 「全体撮影」モードの「手動4隅指定」ボタンから呼ばれる。自動検出は行わず、
    // 直接4隅タップモードに入る。4隅確定後は自動計測(measureBorders以降)へ進む
    // (finishCornerPick 内で cornerPickContext === 'full' の場合の分岐を参照)。
    function enterFullModeCornerPick(imgElement) {
      const MAX_DIM = 1400;
      let scale = 1;
      if (imgElement.width > MAX_DIM || imgElement.height > MAX_DIM) {
        scale = MAX_DIM / Math.max(imgElement.width, imgElement.height);
      }
      const baseCanvas = document.createElement('canvas');
      baseCanvas.width = Math.round(imgElement.width * scale);
      baseCanvas.height = Math.round(imgElement.height * scale);
      baseCanvas.getContext('2d').drawImage(imgElement, 0, 0, baseCanvas.width, baseCanvas.height);
      // 写真全体が横長(=カメラが横向き)なら縦向きに回転しておく(タップ操作自体は必須ではない)。
      const baseSource = baseCanvas.width > baseCanvas.height ? rotateCanvas90(baseCanvas, 1) : baseCanvas;

      cornerPickContext = 'full';
      fullModeUI.style.display = 'none';
      manualModeUI.style.display = 'block';
      manualPreCorrectSource = null;
      manualUndoAutoCorrectBtn.style.display = 'none';

      setupManualCanvas(baseSource);
      manualProgress.style.display = 'none'; // 全体撮影モードでは8点の枠指定バーは不要
      manualCornerPickActive = true;
      manualCornerPoints = [];
      manualInstruction.textContent = CORNER_PICK_LABELS[0];
      manualSubstatus.textContent = '4隅をタップして囲むと、自動でセンタリングを計測します';
      redrawManualCanvas();
      setStatus('');
    }

    function startManualCapture(imgElement) {
      setStatus('画像を解析中...');
      const MAX_DIM = 1400;
      let scale = 1;
      if (imgElement.width > MAX_DIM || imgElement.height > MAX_DIM) {
        scale = MAX_DIM / Math.max(imgElement.width, imgElement.height);
      }
      const baseCanvas = document.createElement('canvas');
      baseCanvas.width = Math.round(imgElement.width * scale);
      baseCanvas.height = Math.round(imgElement.height * scale);
      baseCanvas.getContext('2d').drawImage(imgElement, 0, 0, baseCanvas.width, baseCanvas.height);

      // カメラを横向きにして撮影した場合も検出できるよう、元の向き・時計回り90度・
      // 反時計回り90度の3パターンで検出を試し、最初に成功したものを採用する。
      const candidates = [baseCanvas, rotateCanvas90(baseCanvas, 1), rotateCanvas90(baseCanvas, -1)];
      let baseSource = null;
      let usedAutoCorrect = false;
      let preCorrectSource = null;
      for (const candidate of candidates) {
        const result = tryDetectAndWarpForManual(candidate);
        if (result) {
          baseSource = result.outCanvas;
          usedAutoCorrect = true;
          preCorrectSource = result.srcCanvas;
          // デバッグ表示:どの4頂点を検出したかを、補正前の写真に重ねて表示する
          // (検出がズレている場合に原因を確認しやすくするため)。
          drawDebugOverlay(result.srcCanvas, result.corners);
          break;
        }
      }

      if (!baseSource) {
        // 自動検出できなかった場合でも、写真全体が横長（＝カメラが横向き）なら
        // 縦向きに回転してから表示する（採寸自体は傾いたままでも2点タップなので支障はない）。
        baseSource = baseCanvas.width > baseCanvas.height ? rotateCanvas90(baseCanvas, 1) : baseCanvas;
        canvasWrap.style.display = 'none';
      }

      manualPreCorrectSource = preCorrectSource;
      manualUndoAutoCorrectBtn.style.display = usedAutoCorrect ? 'block' : 'none';

      setupManualCanvas(baseSource);
      manualSubstatus.textContent = usedAutoCorrect
        ? '✅ 傾きを自動補正しました（上の画像は検出した輪郭の確認用）。ズレている場合は「直前の補正を取り消す」を押してください。ピンチで拡大して各辺の線を指定してください'
        : '⚠️ 自動補正できなかったため、向きの補正のみ行った状態で採寸します（傾いていても2点タップの直線指定なら問題ありません）';
      setStatus('');
    }

    function setupManualCanvas(sourceCanvas) {
      manualImage = sourceCanvas;
      manualCanvas.width = sourceCanvas.width;
      manualCanvas.height = sourceCanvas.height;
      // CSSのwidth:100%等の影響を受けないよう、表示サイズをビットマップと明示的に一致させる
      // （タップ座標の変換はこの1:1関係を前提にしている）。
      manualCanvas.style.width = sourceCanvas.width + 'px';
      manualCanvas.style.height = sourceCanvas.height + 'px';
      manualLines = {};
      manualStepIdx = 0;
      manualCurrentPoints = [];
      manualCornerPickActive = false;
      manualCornerPoints = [];

      manualCaptureBtns.style.display = 'none';
      manualViewport.style.display = 'block';
      manualInstruction.style.display = 'block';
      manualProgress.style.display = 'flex';
      manualZoomHint.style.display = 'block';
      manualActionBtns.style.display = 'flex';
      manualRotateBtn.style.display = 'block';
      manualCornerPickBtn.style.display = 'block';

      const rect = manualViewport.getBoundingClientRect();
      const fitScale = Math.min(rect.width / sourceCanvas.width, rect.height / sourceCanvas.height, 1);
      manualZoom = {
        scale: fitScale,
        tx: (rect.width - sourceCanvas.width * fitScale) / 2,
        ty: (rect.height - sourceCanvas.height * fitScale) / 2,
        minScale: fitScale,
        maxScale: Math.max(fitScale * 10, 6),
      };
      applyManualZoom();
      updateManualProgressUI();
      redrawManualCanvas();
    }

    function applyManualZoom() {
      manualCanvas.style.transform = `translate(${manualZoom.tx}px, ${manualZoom.ty}px) scale(${manualZoom.scale})`;
    }

    function clampScale(s) { return Math.min(manualZoom.maxScale, Math.max(manualZoom.minScale, s)); }

    function updateManualProgressUI() {
      const els = manualProgress.querySelectorAll('.mstep');
      els.forEach((el, i) => {
        el.classList.toggle('done', i < manualStepIdx);
        el.classList.toggle('active', i === manualStepIdx);
      });
      if (manualStepIdx < MANUAL_STEPS.length) {
        manualInstruction.textContent = MANUAL_STEPS[manualStepIdx].label;
      } else {
        manualInstruction.textContent = '✅ 8点すべて指定完了';
      }
    }

    function redrawManualCanvas() {
      if (!manualImage) return;
      manualCtx.clearRect(0, 0, manualCanvas.width, manualCanvas.height);
      manualCtx.drawImage(manualImage, 0, 0);

      const lineWidthPx = Math.max(2, manualCanvas.width * 0.0025);
      const pointRadius = Math.max(4, manualCanvas.width * 0.006);

      if (manualCornerPickActive) {
        manualCtx.strokeStyle = '#f0c040';
        manualCtx.fillStyle = '#f0c040';
        manualCtx.lineWidth = lineWidthPx;
        if (manualCornerPoints.length > 0) {
          manualCtx.beginPath();
          manualCtx.moveTo(manualCornerPoints[0].x, manualCornerPoints[0].y);
          for (let i = 1; i < manualCornerPoints.length; i++) {
            manualCtx.lineTo(manualCornerPoints[i].x, manualCornerPoints[i].y);
          }
          manualCtx.stroke();
          for (const p of manualCornerPoints) {
            manualCtx.beginPath();
            manualCtx.arc(p.x, p.y, pointRadius, 0, Math.PI * 2);
            manualCtx.fill();
          }
        }
        if (manualPointDrag && manualPointDrag.previewImgPt) {
          const p = manualPointDrag.previewImgPt;
          // 直前の確定点からドラッグ中の点まで、確定前でもリアルタイムに線を表示する
          if (manualCornerPoints.length > 0) {
            const last = manualCornerPoints[manualCornerPoints.length - 1];
            manualCtx.strokeStyle = '#f0c040';
            manualCtx.lineWidth = lineWidthPx;
            manualCtx.beginPath();
            manualCtx.moveTo(last.x, last.y);
            manualCtx.lineTo(p.x, p.y);
            manualCtx.stroke();
          }
          manualCtx.fillStyle = '#f0c040';
          manualCtx.beginPath();
          manualCtx.arc(p.x, p.y, pointRadius, 0, Math.PI * 2);
          manualCtx.fill();
          manualCtx.strokeStyle = '#ffffff';
          manualCtx.lineWidth = Math.max(1.5, lineWidthPx * 0.6);
          manualCtx.beginPath();
          manualCtx.arc(p.x, p.y, pointRadius * 2, 0, Math.PI * 2);
          manualCtx.stroke();
        }
        return;
      }

      function drawLine(pts, color) {
        manualCtx.strokeStyle = color;
        manualCtx.lineWidth = lineWidthPx;
        manualCtx.beginPath();
        manualCtx.moveTo(pts[0].x, pts[0].y);
        manualCtx.lineTo(pts[1].x, pts[1].y);
        manualCtx.stroke();
        for (const p of pts) {
          manualCtx.fillStyle = color;
          manualCtx.beginPath();
          manualCtx.arc(p.x, p.y, pointRadius, 0, Math.PI * 2);
          manualCtx.fill();
        }
      }

      for (const side of Object.keys(manualLines)) {
        const entry = manualLines[side];
        if (entry.outer) drawLine(entry.outer, MANUAL_COLORS.outer);
        if (entry.inner) drawLine(entry.inner, MANUAL_COLORS.inner);
      }

      // 現在のステップで打った1点目（まだ2点揃っていない）
      if (manualCurrentPoints.length === 1) {
        const step = MANUAL_STEPS[manualStepIdx];
        manualCtx.fillStyle = MANUAL_COLORS[step.kind];
        manualCtx.beginPath();
        manualCtx.arc(manualCurrentPoints[0].x, manualCurrentPoints[0].y, pointRadius, 0, Math.PI * 2);
        manualCtx.fill();
      }

      // ドラッグで微調整中の点（指を離すまでは未確定）。輪っかで強調表示する。
      if (manualPointDrag && manualPointDrag.previewImgPt && manualStepIdx < MANUAL_STEPS.length) {
        const step = MANUAL_STEPS[manualStepIdx];
        const p = manualPointDrag.previewImgPt;
        manualCtx.fillStyle = MANUAL_COLORS[step.kind];
        manualCtx.beginPath();
        manualCtx.arc(p.x, p.y, pointRadius, 0, Math.PI * 2);
        manualCtx.fill();
        manualCtx.strokeStyle = '#ffffff';
        manualCtx.lineWidth = Math.max(1.5, lineWidthPx * 0.6);
        manualCtx.beginPath();
        manualCtx.arc(p.x, p.y, pointRadius * 2, 0, Math.PI * 2);
        manualCtx.stroke();
      }
    }

    function screenToImageCoords(clientX, clientY) {
      const rect = manualViewport.getBoundingClientRect();
      const relX = clientX - rect.left, relY = clientY - rect.top;
      return {
        x: (relX - manualZoom.tx) / manualZoom.scale,
        y: (relY - manualZoom.ty) / manualZoom.scale,
      };
    }

    // 指先が隠す分、選択位置は少し上（画面上で約2cm）にオフセットして見えるようにする。
    // デバイスのDPIに依存せず正確にpx換算するため、実際に2cm幅の要素を描画して測る。
    function measurePxPerCm(cm) {
      const el = document.createElement('div');
      el.style.cssText = `width:${cm}cm;height:${cm}cm;position:absolute;visibility:hidden;pointer-events:none;`;
      document.body.appendChild(el);
      const px = el.getBoundingClientRect().width || cm * 37.8;
      document.body.removeChild(el);
      return px;
    }
    const MANUAL_TAP_OFFSET_PX = measurePxPerCm(2);

    function tapPreviewImgPt(clientX, clientY) {
      const p = screenToImageCoords(clientX, clientY - MANUAL_TAP_OFFSET_PX);
      return {
        x: Math.min(Math.max(p.x, 0), manualCanvas.width),
        y: Math.min(Math.max(p.y, 0), manualCanvas.height),
      };
    }

    function startPointGesture(pointerId, clientX, clientY) {
      manualGestureMode = 'point';
      manualPointDrag = { pointerId, previewImgPt: tapPreviewImgPt(clientX, clientY) };
      redrawManualCanvas();
    }

    // 指1本＝点の配置・微調整、指2本＝画像の移動／拡大縮小（ピンチ）。
    // 「2本指でつまむ・動かす」という単純な区別にすることで、ダブルタップの
    // タイミング判定に頼らず確実に見分けられるようにしている。
    manualViewport.addEventListener('pointerdown', (e) => {
      if (!manualImage) return;
      e.preventDefault();
      try { manualViewport.setPointerCapture(e.pointerId); } catch (err) {}
      manualPointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

      if (manualPointers.size === 1) {
        startPointGesture(e.pointerId, e.clientX, e.clientY);
        manualPinch = null;
      } else if (manualPointers.size === 2) {
        const pts = [...manualPointers.values()];
        manualPinch = {
          dist: Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y),
          scale: manualZoom.scale,
          mid: { x: (pts[0].x + pts[1].x) / 2, y: (pts[0].y + pts[1].y) / 2 },
          tx: manualZoom.tx, ty: manualZoom.ty,
        };
        manualGestureMode = 'pinch';
        manualPointDrag = null;
      }
    });

    manualViewport.addEventListener('pointermove', (e) => {
      if (!manualImage || !manualPointers.has(e.pointerId)) return;
      e.preventDefault();
      manualPointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

      if (manualPointers.size === 2 && manualPinch) {
        const pts = [...manualPointers.values()];
        const d = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
        const mid = { x: (pts[0].x + pts[1].x) / 2, y: (pts[0].y + pts[1].y) / 2 };
        const newScale = clampScale(manualPinch.scale * (d / manualPinch.dist));
        const rect = manualViewport.getBoundingClientRect();
        const anchorRelX = manualPinch.mid.x - rect.left, anchorRelY = manualPinch.mid.y - rect.top;
        const imgX = (anchorRelX - manualPinch.tx) / manualPinch.scale;
        const imgY = (anchorRelY - manualPinch.ty) / manualPinch.scale;
        manualZoom.scale = newScale;
        manualZoom.tx = anchorRelX - imgX * newScale + (mid.x - manualPinch.mid.x);
        manualZoom.ty = anchorRelY - imgY * newScale + (mid.y - manualPinch.mid.y);
        applyManualZoom();
      } else if (manualGestureMode === 'point' && manualPointDrag && e.pointerId === manualPointDrag.pointerId) {
        // 画像は動かさず、タップ位置（点）だけを指の少し上に追従させて微調整する
        manualPointDrag.previewImgPt = tapPreviewImgPt(e.clientX, e.clientY);
        redrawManualCanvas();
      }
    });

    function manualPointerEnd(e) {
      if (!manualImage) return;
      e.preventDefault();

      if (manualGestureMode === 'point' && manualPointDrag && e.pointerId === manualPointDrag.pointerId) {
        handleManualTap(manualPointDrag.previewImgPt);
        manualPointDrag = null;
      }

      manualPointers.delete(e.pointerId);
      manualPinch = null;
      // 2本指ジェスチャーの終わりは指が完全に同時に離れるとは限らない。
      // 残り1本になった時点で即座に「点の配置」を再開してしまうと、その指が
      // 直後に離れた際に意図しない点が確定してしまうため、ここでは何もしない
      // （点を打ちたい場合は指を一度離してから改めてタップしてもらう）。
      if (manualPointers.size === 0) {
        manualGestureMode = null;
      }
      redrawManualCanvas();
    }
    manualViewport.addEventListener('pointerup', manualPointerEnd);
    manualViewport.addEventListener('pointercancel', manualPointerEnd);

    manualViewport.addEventListener('wheel', (e) => {
      if (!manualImage) return;
      e.preventDefault();
      const rect = manualViewport.getBoundingClientRect();
      const relX = e.clientX - rect.left, relY = e.clientY - rect.top;
      const imgX = (relX - manualZoom.tx) / manualZoom.scale, imgY = (relY - manualZoom.ty) / manualZoom.scale;
      const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
      const newScale = clampScale(manualZoom.scale * factor);
      manualZoom.tx = relX - imgX * newScale;
      manualZoom.ty = relY - imgY * newScale;
      manualZoom.scale = newScale;
      applyManualZoom();
    }, { passive: false });

    function handleManualTap(imgPt) {
      // 指ずらし分のオフセットで画像端の外に出た場合は、無視せず端に留めて採用する
      // （そうしないと上端付近の辺を選ぼうとしたタップがすべて無効になってしまう）。
      const clamped = {
        x: Math.min(Math.max(imgPt.x, 0), manualCanvas.width),
        y: Math.min(Math.max(imgPt.y, 0), manualCanvas.height),
      };

      if (manualCornerPickActive) {
        manualCornerPoints.push(clamped);
        if (manualCornerPoints.length < 4) {
          manualInstruction.textContent = CORNER_PICK_LABELS[manualCornerPoints.length];
          redrawManualCanvas();
        } else {
          finishCornerPick();
        }
        return;
      }

      if (manualStepIdx >= MANUAL_STEPS.length) return;

      manualCurrentPoints.push(clamped);
      if (manualCurrentPoints.length === 2) {
        const step = MANUAL_STEPS[manualStepIdx];
        if (!manualLines[step.side]) manualLines[step.side] = {};
        manualLines[step.side][step.kind] = manualCurrentPoints;
        manualCurrentPoints = [];
        manualStepIdx++;
        updateManualProgressUI();
        if (manualStepIdx >= MANUAL_STEPS.length) {
          redrawManualCanvas();
          finishManualMeasurement();
          return;
        }
      }
      redrawManualCanvas();
    }

    // 直前に確定した2点のうち、後の1点だけを取り消して1点目は残す（1点ずつ戻る）
    function revertLastPointOfStep(idx) {
      const step = MANUAL_STEPS[idx];
      const pts = manualLines[step.side] && manualLines[step.side][step.kind];
      if (pts && pts.length === 2) {
        manualCurrentPoints = [pts[0]];
        delete manualLines[step.side][step.kind];
        manualStepIdx = idx;
      }
    }

    function manualUndo() {
      if (manualCornerPickActive) {
        if (manualCornerPoints.length > 0) {
          manualCornerPoints.pop();
          manualInstruction.textContent = CORNER_PICK_LABELS[manualCornerPoints.length];
        }
        redrawManualCanvas();
        return;
      }
      if (manualStepIdx >= MANUAL_STEPS.length && manualCurrentPoints.length === 0) {
        // 8点すべて指定し結果表示済みの状態から、最後の辺の2点目だけを取り消す
        resultSection.style.display = 'none';
        revertLastPointOfStep(MANUAL_STEPS.length - 1);
      } else if (manualCurrentPoints.length > 0) {
        // 現在のステップでまだ1点目だけ（2点目未確定）→ その1点を取り消す
        manualCurrentPoints.pop();
      } else if (manualStepIdx > 0) {
        // 直前のステップは2点とも確定済み → 2点目だけ取り消し、1点目は残す
        revertLastPointOfStep(manualStepIdx - 1);
      }
      updateManualProgressUI();
      redrawManualCanvas();
    }

    // 進捗バッジ（①②③...）をタップすると、その辺のやり直しまで一気に戻れる。
    // それ以降（後の辺）の指定済みデータもあわせて破棄する。
    function jumpToManualStep(idx) {
      if (idx < 0 || idx > manualStepIdx) return;
      const lastIdx = Math.min(manualStepIdx, MANUAL_STEPS.length - 1);
      for (let i = idx; i <= lastIdx; i++) {
        const step = MANUAL_STEPS[i];
        if (manualLines[step.side]) delete manualLines[step.side][step.kind];
      }
      manualStepIdx = idx;
      manualCurrentPoints = [];
      resultSection.style.display = 'none';
      updateManualProgressUI();
      redrawManualCanvas();
    }

    function pointLineDistance(pt, lp1, lp2) {
      const dx = lp2.x - lp1.x, dy = lp2.y - lp1.y;
      const len = Math.hypot(dx, dy);
      if (len < 1e-6) return Math.hypot(pt.x - lp1.x, pt.y - lp1.y);
      const cross = Math.abs(dx * (lp1.y - pt.y) - dy * (lp1.x - pt.x));
      return cross / len;
    }

    function lineToLineDistance(outer, inner) {
      const d1 = pointLineDistance(inner[0], outer[0], outer[1]);
      const d2 = pointLineDistance(inner[1], outer[0], outer[1]);
      return (d1 + d2) / 2;
    }

    function finishManualMeasurement() {
      const left = lineToLineDistance(manualLines.left.outer, manualLines.left.inner);
      const right = lineToLineDistance(manualLines.right.outer, manualLines.right.inner);
      const top = lineToLineDistance(manualLines.top.outer, manualLines.top.inner);
      const bottom = lineToLineDistance(manualLines.bottom.outer, manualLines.bottom.inner);

      const centering = computeCentering({ left, right, top, bottom });
      const gradeInfo = estimateGrade(centering);
      renderManualResults(centering, gradeInfo);
    }

    function renderManualResults(centering, gradeInfo) {
      setStatus('');
      resultSection.style.display = 'block';
      const markedDataUrl = manualCanvas.toDataURL('image/jpeg', 0.85);

      resultSection.innerHTML = `
        <div class="card-box grade-box">
          <div class="section-label">推定グレード（センタリングのみ・前面基準・手動計測）</div>
          <div class="grade-value">${esc(gradeInfo.overall)}</div>
          <div class="grade-caption">左右 ${esc(gradeInfo.lrGrade)} ／ 上下 ${esc(gradeInfo.tbGrade)}</div>
        </div>

        <div class="card-box">
          <div class="section-label">📏 計測結果</div>

          <div class="ratio-row">
            <span class="ratio-label">左右 (Left / Right)</span>
            <span class="ratio-value">${centering.lrMajor.toFixed(1)} / ${centering.lrMinor.toFixed(1)}</span>
          </div>
          <div class="ratio-bar">
            <div class="fill-a" style="width:${centering.accuracyLR}%"></div>
            <div class="fill-b" style="width:${100 - centering.accuracyLR}%"></div>
          </div>

          <div class="ratio-row" style="margin-top:14px;">
            <span class="ratio-label">上下 (Top / Bottom)</span>
            <span class="ratio-value">${centering.tbMajor.toFixed(1)} / ${centering.tbMinor.toFixed(1)}</span>
          </div>
          <div class="ratio-bar">
            <div class="fill-a" style="width:${centering.accuracyTB}%"></div>
            <div class="fill-b" style="width:${100 - centering.accuracyTB}%"></div>
          </div>
        </div>

        <div class="card-box">
          <div class="section-label">✏️ 指定した線</div>
          <img src="${markedDataUrl}" style="width:100%;border-radius:8px;" />
        </div>

        ${driveSaveUIHtml()}
      `;
      wireDriveSaveButton(markedDataUrl);
    }
  </script>
</body>
</html>
